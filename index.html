<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mire se Erdhet ne BioLab! Eksperimente Bioteknologjie</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      color: #0077cc;
    }

    .experiment {
      margin: 40px 0;
    }

    video, iframe {
      width: 800px;
      height: 450px;
      border: 3px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
    }

    .title {
      margin-top: 10px;
      font-weight: bold;
    }

    input {
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h1>Eksperimente në Bioteknologji</h1>

  <!-- YOUTUBE VIDEOS -->
  <div class="experiment">
    <iframe src="https://www.youtube.com/embed/I-qtkfecACo" allowfullscreen></iframe>
    <div class="title">Eksperimenti 1: Farmakogjenomika</div>
  </div>

  <div class="experiment">
    <iframe src="https://www.youtube.com/embed/xZnEqJf-uvQ" allowfullscreen></iframe>
    <div class="title">Eksperimenti 2: Nanobioteknologjia</div>
  </div>

  <div class="experiment">
    <iframe src="https://www.youtube.com/embed/5OAZie4ytok" allowfullscreen></iframe>
    <div class="title">Eksperimenti 3: Inxhinieria e Indeve</div>
  </div>
</body>
</html>
